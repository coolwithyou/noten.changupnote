<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
      }

      main {
        display: grid;
        grid-template-rows: auto auto 1fr;
        height: 100vh;
      }

      header,
      .toolbar {
        border-bottom: 1px solid var(--figma-color-border);
        padding: 14px 16px;
      }

      header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 16px;
        line-height: 1.35;
      }

      p {
        margin: 0;
        color: var(--figma-color-text-secondary);
        font-size: 12px;
        line-height: 1.55;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--figma-color-text-secondary);
        font-size: 12px;
      }

      button {
        height: 32px;
        border: 1px solid var(--figma-color-border);
        border-radius: 8px;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
        padding: 0 12px;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
      }

      button.primary {
        border-color: var(--figma-color-bg-brand);
        background: var(--figma-color-bg-brand);
        color: var(--figma-color-text-onbrand);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      textarea {
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
        padding: 16px;
        resize: none;
        outline: none;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 11px;
        line-height: 1.55;
      }

      .status {
        margin-left: auto;
        color: var(--figma-color-text-secondary);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>TDS Variables Exporter</h1>
          <p>
            현재 Figma 파일의 Local Variables와 Local Styles를 JSON으로
            내보냅니다.
          </p>
        </div>
        <button id="close" type="button">닫기</button>
      </header>

      <section class="toolbar">
        <button class="primary" id="export" type="button">Export JSON</button>
        <button id="copy" type="button" disabled>Copy</button>
        <button id="download" type="button" disabled>Download</button>
        <label>
          <input id="includeTeamLibrary" type="checkbox" />
          Team library variables도 조회
        </label>
        <span class="status" id="status">대기 중</span>
      </section>

      <textarea
        id="output"
        spellcheck="false"
        placeholder="Export JSON 버튼을 누르면 결과가 표시됩니다."
      ></textarea>
    </main>

    <script>
      const output = document.getElementById("output");
      const statusEl = document.getElementById("status");
      const exportButton = document.getElementById("export");
      const copyButton = document.getElementById("copy");
      const downloadButton = document.getElementById("download");
      const closeButton = document.getElementById("close");
      const includeTeamLibrary = document.getElementById("includeTeamLibrary");

      function setBusy(isBusy) {
        exportButton.disabled = isBusy;
        statusEl.textContent = isBusy ? "추출 중" : "완료";
      }

      function requestExport() {
        setBusy(true);
        parent.postMessage(
          {
            pluginMessage: {
              type: "export",
              includeTeamLibrary: includeTeamLibrary.checked,
            },
          },
          "*"
        );
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "export:success") {
          output.value = JSON.stringify(message.payload, null, 2);
          copyButton.disabled = false;
          downloadButton.disabled = false;
          setBusy(false);
          return;
        }

        if (message.type === "export:error") {
          output.value = `ERROR: ${message.message}`;
          copyButton.disabled = false;
          downloadButton.disabled = true;
          setBusy(false);
          statusEl.textContent = "오류";
        }
      };

      exportButton.onclick = requestExport;

      copyButton.onclick = async () => {
        output.focus();
        output.select();
        try {
          await navigator.clipboard.writeText(output.value);
          statusEl.textContent = "복사됨";
        } catch {
          document.execCommand("copy");
          statusEl.textContent = "복사됨";
        }
      };

      downloadButton.onclick = () => {
        const blob = new Blob([output.value], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "tds-figma-variables.json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      };

      closeButton.onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };

      requestExport();
    </script>
  </body>
</html>

name: Matching CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: matching-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify package and application types
        run: pnpm typecheck

      - name: Verify contracts and database policy
        run: |
          pnpm verify:openapi
          pnpm verify:rls-context
          pnpm verify:rls-policy
          pnpm verify:db-migrations

      - name: Run matching regression gates
        run: |
          pnpm test:matching-unit
          pnpm verify:first-mission-recovery
          pnpm verify:matching-eval
